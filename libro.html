<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Libro de Reclamaciones | Bloomix Oficial</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<link rel="stylesheet" href="style.css">

<style>

body{
    background:#fff7fb;
    font-family:'Poppins',sans-serif;
}

.libro{
    padding:70px 0;
}

.card-libro{

    background:white;

    border-radius:25px;

    padding:40px;

    box-shadow:0 15px 40px rgba(0,0,0,.08);

}

.titulo{

    text-align:center;

    margin-bottom:40px;

}

.titulo h1{

    color:#ff3f8e;

    font-weight:700;

}

.titulo p{

    color:#777;

}

label{

    font-weight:600;

    margin-bottom:8px;

}

.form-control,
.form-select{

    border-radius:12px;

    padding:12px;

}

textarea{

    resize:none;

}

.btn-enviar{

    background:#ff3f8e;

    color:white;

    border:none;

    border-radius:14px;

    padding:14px;

    font-weight:700;

    transition:.3s;

}

.btn-enviar:hover{

    background:#e91e63;

}

</style>

</head>

<body>

<section class="libro">

<div class="container">

<div class="card-libro">

<div class="titulo">

<h1>

📖 Libro de Reclamaciones

</h1>

<p>

Conforme al Código de Protección y Defensa del Consumidor.

</p>

</div>

<form id="formReclamo">

<div class="row">

<div class="col-md-6">

<label>

Nombre Completo

</label>

<input
type="text"
id="nombre"
class="form-control"
required>

</div>

<div class="col-md-6">

<label>

DNI / CE / Pasaporte

</label>

<input
type="text"
id="documento"
class="form-control"
required>

</div>

</div>

<div class="row mt-3">

<div class="col-md-6">

<label>

Correo electrónico

</label>

<input
type="email"
id="correo"
class="form-control"
required>

</div>

<div class="col-md-6">

<label>

Teléfono

</label>

<input
type="text"
id="telefono"
class="form-control"
required>

</div>

</div>

<div class="mt-3">

<label>

Dirección

</label>

<input
type="text"
id="direccion"
class="form-control">

</div>

<div class="row mt-3">

<div class="col-md-6">

<label>

Tipo

</label>

<select
id="tipo"
class="form-select">

<option value="Reclamo">

Reclamo

</option>

<option value="Queja">

Queja

</option>

</select>

</div>

<div class="col-md-6">

<label>

N° de pedido (opcional)

</label>

<input
type="text"
id="pedido"
class="form-control">

</div>

</div>

<div class="mt-3">

<label>

Descripción

</label>

<textarea
id="descripcion"
rows="6"
class="form-control"
required></textarea>

</div>
<div class="form-check mt-4">

<input
class="form-check-input"
type="checkbox"
id="acepto"
required>

<label
class="form-check-label"
for="acepto">

Declaro que la información proporcionada es verdadera y solicito la atención de mi reclamo conforme a la normativa vigente.

</label>

</div>

<div class="mt-4">

<button
type="submit"
class="btn btn-enviar w-100">

<i class="fa-solid fa-paper-plane"></i>

Enviar Reclamo

</button>

</div>

</form>

<div
id="mensaje"
class="alert alert-success mt-4 d-none">

✅ Tu reclamo fue enviado correctamente. Nos comunicaremos contigo a la brevedad.

</div>

</div>

</div>

</section>

<script type="module" src="libro.js"></script>

</body>

</html>
