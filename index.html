<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bloomix Oficial</title>
<style>
body{
font-family:Arial,sans-serif;
background:#fff5f7;
margin:0;
padding:20px;
text-align:center;
}
header img{
width:120px;
border-radius:50%;
}
h1{
color:#c76b8a;
margin:10px 0;
}
.producto{
background:#fff;
border-radius:15px;
padding:15px;
margin:20px auto;
max-width:350px;
box-shadow:0 4px 10px rgba(0,0,0,.15);
}
.producto img{
width:100%;
border-radius:10px;
}
.precio{
font-size:28px;
color:#e91e63;
font-weight:bold;
}
.btn{
display:inline-block;
background:#25D366;
color:#fff;
padding:12px 20px;
border-radius:8px;
text-decoration:none;
font-weight:bold;
margin-top:10px;
}
</style>
</head>

<body>

<header>
<h1>🌸 BLOOMIX OFICIAL 🌸</h1>
<p>Cosméticos y perfumes originales</p>
</header>

<div class="producto">
  <img src="https://via.placeholder.com/500x500" alt="Perfume">

  <h2>Body Mist 35ml</h2>

  <p class="precio">S/ 5.00</p>

  <button class="btn" onclick="agregarCarrito('Body Mist 35ml',5)">
    Agregar al carrito 🛒
  </button>
</div>

<div id="carrito"></div>

</body>
</html>
